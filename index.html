<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Музичний сайт</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b10;
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #121218;
            border-bottom: 1px solid #222;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            color: #1DB954;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: #1c1c1e;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 18px;
            transition: 0.2s;
        }

        .card:hover {
            background: #262629;
            transform: translateY(-3px);
        }

        .title {
            font-size: 14px;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        iframe {
            width: 100%;
            height: 175px;
            border: none;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            opacity: 0.4;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <header>
        <h1>🎧 Мій музичний сайт</h1>
    </header>

    <div class="container">

        <!-- SONG 1 -->
        <div class="card">
            <div class="title">The Right Road</div>
            <iframe src="https://embed.music.apple.com/ua/song/the-right-road/1154388457?l=uk"></iframe>
        </div>

        <!-- SONG 2 -->
        <div class="card">
            <div class="title">А що</div>
            <iframe src="https://embed.music.apple.com/ua/song/%D0%B0-%D1%89%D0%BE/1745509383?l=uk"></iframe>
        </div>

        <!-- SONG 3 -->
        <div class="card">
            <div class="title">З якого ти поверху неба</div>
            <iframe src="https://embed.music.apple.com/ua/song/%D0%B7-%D1%8F%D0%BA%D0%BE%D0%B3%D0%BE-%D1%82%D0%B8-%D0%BF%D0%BE%D0%B2%D0%B5%D1%80%D1%85%D1%83-%D0%BD%D0%B5%D0%B1%D0%B0/1807756270?l=uk"></iframe>
        </div>

        <!-- SONG 4 (твій новий) -->
        <div class="card">
            <div class="title">Teresa & Maria</div>
            <iframe src="https://embed.music.apple.com/us/song/teresa-maria/1724327757"></iframe>
        </div>

    </div>

    <footer>
        © 2026 Music Site • Powered by Apple Music
    </footer>

</body>

</html>
